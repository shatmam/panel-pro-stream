<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Super Streaming Admin</title>

  <style>
    :root{
      --bg0:#070A16;
      --bg1:#0B1026;
      --bg2:#0E173A;
      --line: rgba(255,255,255,.10);
      --txt:#F6F8FF;
      --muted:#B5C0FF;
      --red:#ff3b5f;
      --green:#18c964;
      --yellow:#f5b301;
      --cyan:#23d5f2;
      --blue:#4f8cff;
      --purple:#b094ff;
      --shadow: 0 20px 70px rgba(0,0,0,.55);
      --shadow2: 0 10px 30px rgba(0,0,0,.45);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--txt);
      background: var(--bg0);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header{
      background: var(--bg1);
      padding: 20px 25px;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
      z-index: 10;
    }

    .header-top{
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .header-top h1{
      margin: 0;
      font-size: 1.4em;
      font-weight: 900;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-top h1 span{ color: var(--blue); }

    .kpis{
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 15px;
    }
    .kpi{
      background: var(--bg2);
      padding: 15px;
      border-radius: 16px;
      border: 1px solid var(--line);
      transition: 0.3s;
      position: relative;
      overflow: hidden;
    }
    .kpi::after{
      content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: var(--line);
    }
    .kpi.vencidos::after{ background: var(--red); }
    .kpi.porvencer::after{ background: var(--yellow); }
    .kpi.activos::after{ background: var(--green); }
    .kpi.total::after{ background: var(--blue); }
    .kpi.stock::after{ background: var(--cyan); }

    .kpi b{ display: block; font-size: 1.8em; line-height: 1; margin-bottom: 5px; }
    .kpi span{ font-size: 0.75em; color: var(--muted); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }

    .controls{
      background: var(--bg1);
      padding: 15px 25px;
      display: flex;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      flex-wrap: wrap;
    }

    .search-box{ flex: 1; position: relative; min-width: 250px; }
    input, select{
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--line);
      color: #fff;
      padding: 10px 15px;
      border-radius: 12px;
      outline: none;
      font-size: 0.95em;
      transition: 0.2s;
    }
    input:focus{ border-color: var(--blue); box-shadow: 0 0 0 3px rgba(79,140,255,0.15); }

    .main-scroll{ flex: 1; overflow-y: auto; padding: 25px; background: var(--bg0); }

    table{
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 8px;
    }
    th{
      text-align: left;
      padding: 0 15px 10px;
      color: var(--muted);
      font-size: 0.75em;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    tr.row-item{
      background: var(--bg1);
      transition: 0.2s;
    }
    tr.row-item:hover{ background: var(--bg2); transform: translateY(-1px); }
    td{ padding: 16px 15px; }
    td:first-child{ border-radius: 15px 0 0 15px; }
    td:last-child{ border-radius: 0 15px 15px 0; text-align: right; }

    .svc-name{ font-weight: 800; color: var(--txt); font-size: 1em; }
    .svc-mail{ font-size: 0.85em; color: var(--muted); margin-top: 2px; }

    .badge{
      padding: 6px 12px;
      border-radius: 10px;
      font-size: 0.75em;
      font-weight: 800;
      text-transform: uppercase;
    }
    .badge-vencido{ background: rgba(255,59,95,0.12); color: var(--red); }
    .badge-activo{ background: rgba(24,201,100,0.12); color: var(--green); }
    .badge-porvencer{ background: rgba(245,179,1,0.12); color: var(--yellow); }
    .badge-disponible{ background: rgba(255,255,255,0.05); color: #fff; border: 1px dashed rgba(255,255,255,0.2); }

    .btn{
      padding: 10px 20px;
      border-radius: 12px;
      border: none;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.9em;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: 0.2s;
    }
    .btn-blue{ background: var(--blue); color: #fff; }
    .btn-green{ background: var(--green); color: #fff; }
    .btn-icon{
      background: var(--bg2);
      color: #fff;
      width: 38px; height: 38px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 12px; border: 1px solid var(--line);
      cursor: pointer;
      font-size: 1.1em;
    }

    /* MODALES */
    .modal{
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center;
      z-index: 1000; padding: 20px;
    }
    .modal-content{
      background: var(--bg1);
      width: 100%; max-width: 480px;
      border-radius: 24px;
      padding: 30px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    #status{ font-size: 0.8em; background: var(--bg2); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--line); }
    .txt-red{ color: var(--red); font-weight: 800; }
  </style>
</head>
<body>

  <header>
    <div class="header-top">
      <h1>SISTEMA <span>STREAMING</span></h1>
      <div id="status">Iniciando...</div>
    </div>

    <div class="kpis">
      <div class="kpi total">
        <b id="cTotal">0</b>
        <span>Clientes Totales</span>
      </div>
      <div class="kpi vencidos">
        <b id="cVencidos">0</b>
        <span>Vencidos</span>
      </div>
      <div class="kpi porvencer">
        <b id="cPorVencer">0</b>
        <span>Por Vencer</span>
      </div>
      <div class="kpi activos">
        <b id="cActivos">0</b>
        <span>Activos</span>
      </div>
      <div class="kpi stock">
        <b id="availTotal">0</b>
        <span>Stock Disponible</span>
      </div>
    </div>
  </header>

  <div class="controls">
    <div class="search-box">
      <input type="text" id="q" placeholder="Buscar por cliente, cuenta o servicio...">
    </div>
    <select id="f" style="width: auto;">
      <option value="">Filtrar Estado</option>
      <option value="vencidos">Vencidos</option>
      <option value="porvencer">Por Vencer</option>
      <option value="activos">Activos</option>
      <option value="disponible">Solo Stock (Disponibles)</option>
    </select>
    <button id="btnAssign" class="btn btn-green">➕ Nueva Venta</button>
    <button id="btnReload" class="btn-icon" title="Actualizar">🔄</button>
  </div>

  <div class="main-scroll">
    <div id="errorBox" style="display:none; background:var(--red); color:white; padding:15px; border-radius:12px; margin-bottom:20px;"></div>
    <table>
      <thead>
        <tr>
          <th>Servicio y Cuenta</th>
          <th>Cliente</th>
          <th>Estado</th>
          <th>Días</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div id="modAssign" class="modal">
    <div class="modal-content">
      <h2 style="margin-top:0">Nueva Asignación</h2>
      <div style="display:grid; gap:15px">
        <input type="text" id="asNom" placeholder="Nombre del Cliente">
        <input type="text" id="asTel" placeholder="WhatsApp (Ej: 18091234567)">
        <select id="asSvc"></select>
        <select id="asAcc"></select>
        <input type="number" id="asDias" value="30" placeholder="Días de Servicio">
        <button id="btnDoAssign" class="btn btn-blue" style="justify-content:center">Confirmar Venta</button>
        <button onclick="$('modAssign').style.display='none'" class="btn" style="background:transparent; color:var(--muted); justify-content:center">Cancelar</button>
      </div>
    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    let allRows = [];
    let lastLoadAt = 0;

    async function api(path, opts={}){
      const key = localStorage.getItem("admin_key");
      const res = await fetch(path, {
        ...opts,
        headers: { ...opts.headers, "Content-Type":"application/json", "x-admin-key": key }
      });
      if(res.status === 401) throw new Error("No autorizado");
      const data = await res.json();
      if(!data.ok) throw new Error(data.error || "Error API");
      return data;
    }

    function setStatus(t){ $("status").textContent = t; }

    async function load(quiet=false){
      if(!quiet) setStatus("Sincronizando...");
      try{
        const data = await api("/api/dashboard");
        allRows = data.rows || [];

        // ✅ LÓGICA DE CONTADORES: Solo cuenta clientes reales
        const c = { vencidos:0, porvencer:0, activos:0, total:0 };
        allRows.forEach(r => {
          if(r.bucket !== "disponible"){
            c.total++;
            if(r.bucket === "vencidos") c.vencidos++;
            else if(r.bucket === "porvencer") c.porvencer++;
            else if(r.bucket === "activos") c.activos++;
          }
        });

        $("cTotal").textContent = c.total;
        $("cVencidos").textContent = c.vencidos;
        $("cPorVencer").textContent = c.porvencer;
        $("cActivos").textContent = c.activos;
        $("availTotal").textContent = data.availableTotal || 0;

        render();
        if(!quiet) setStatus("Sincronizado ✅");
      }catch(e){
        if(e.message === "No autorizado"){
          const k = prompt("Introduce tu Admin Key:");
          if(k){ localStorage.setItem("admin_key", k); load(); }
        } else {
          setStatus("Error ❌");
          alert(e.message);
        }
      }
    }

    function render(){
      const q = $("q").value.toLowerCase();
      const f = $("f").value;
      const body = $("tableBody");
      body.innerHTML = "";

      const filtered = allRows.filter(r => {
        const matchQ = !q || (r.nombre + r.correo + r.servicio).toLowerCase().includes(q);
        const matchF = !f || r.bucket === f;
        return matchQ && matchF;
      });

      filtered.forEach(r => {
        const tr = document.createElement("tr");
        tr.className = "row-item";
        const isV = r.bucket === "vencidos";
        const isD = r.bucket === "disponible";

        tr.innerHTML = `
          <td>
            <div class="svc-name">${r.servicio}</div>
            <div class="svc-mail">${r.correo}</div>
          </td>
          <td>${isD ? '<span style="color:var(--muted)">-</span>' : r.nombre}</td>
          <td><span class="badge badge-${r.bucket}">${r.bucket.replace('porvencer','Pox Vencer').toUpperCase()}</span></td>
          <td class="${isV ? 'txt-red' : ''}">${isD ? '-' : r.dias}</td>
          <td>
            <button class="btn-icon" onclick="copyClient(${r.row})">📋</button>
            <button class="btn-icon" onclick="editRow(${r.row})">✏️</button>
            ${isV ? `<button class="btn-icon" style="color:var(--green)" onclick="renewRow(${r.row})">🔄</button>` : ''}
            <button class="btn-icon" style="color:var(--red)" onclick="deleteRow(${r.row})">🗑️</button>
          </td>
        `;
        body.appendChild(tr);
      });
    }

    // Funciones de acción (deben estar conectadas a tus rutas en server.js)
    async function renewRow(row){
      const d = prompt("¿Cuántos días renovar?", "30");
      if(!d) return;
      await api("/api/renovar", { method:"POST", body: JSON.stringify({ row, dias:Number(d) }) });
      load(true);
    }

    async function deleteRow(row){
      if(!confirm("¿Eliminar este cliente y liberar la cuenta?")) return;
      await api("/api/delete", { method:"POST", body: JSON.stringify({ row }) });
      load(true);
    }

    $("q").oninput = render;
    $("f").onchange = render;
    $("btnReload").onclick = () => load();
    $("btnAssign").onclick = () => $("modAssign").style.display='flex';
    window.onload = () => load();
  </script>
</body>
</html>
