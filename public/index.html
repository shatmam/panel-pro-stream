<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Super Streaming Admin</title>

  <style>
    :root{
      --bg0:#070A16;
      --bg1:#0B1026;
      --bg2:#0E173A;
      --line: rgba(255,255,255,.10);
      --txt:#F6F8FF;
      --muted:#B5C0FF;
      --red:#ff3b5f;
      --green:#18c964;
      --yellow:#f5b301;
      --cyan:#23d5f2;
      --blue:#4f8cff;
      --purple:#b094ff;
      --shadow: 0 20px 70px rgba(0,0,0,.55);
      --shadow2: 0 10px 30px rgba(0,0,0,.45);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--txt);
      background:
        radial-gradient(900px 520px at 12% 8%, rgba(79,140,255,.22), transparent 60%),
        radial-gradient(900px 600px at 88% 8%, rgba(176,148,255,.20), transparent 55%),
        radial-gradient(820px 520px at 50% 92%, rgba(35,213,242,.12), transparent 62%),
        linear-gradient(180deg, var(--bg0), var(--bg1) 40%, var(--bg2));
    }

    .wrap{max-width:1400px;margin:0 auto;padding:22px 18px 70px}

    .topbar{ display:flex;align-items:center;justify-content:space-between; gap:14px;flex-wrap:wrap; margin-bottom:18px; }
    .brand{display:flex;align-items:center;gap:14px;}
    .logo{
      width:50px;height:50px;border-radius:18px;
      display:grid;place-items:center; font-weight:1000;
      background: linear-gradient(135deg, rgba(79,140,255,.95), rgba(176,148,255,.95));
      border:1px solid rgba(255,255,255,.10);
      box-shadow: 0 18px 50px rgba(79,140,255,.16);
    }
    .title h1{margin:0;font-size:22px;line-height:1}
    .title .sub{margin:0;color:var(--muted);font-size:12px}

    .kpis{ display:grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap:16px; margin-bottom:18px; }
    .kpi{
      background: rgba(12,16,35,.62); border:1px solid rgba(255,255,255,.10);
      border-radius: 22px; padding: 22px 18px; text-align:center; backdrop-filter: blur(16px);
    }
    .kpi .n{ font-size:44px; font-weight:1000; margin:0; }
    .kpi.red .n{ color: var(--red); }
    .kpi .lbl{ margin-top:6px; color: rgba(181,192,255,.85); font-size:12px; letter-spacing:1.4px; text-transform:uppercase; }

    .panel{ background: rgba(12,16,35,.62); border:1px solid rgba(255,255,255,.10); border-radius: 22px; padding:18px; }
    .assign{ display:grid; grid-template-columns: 1.3fr 1.3fr 1.2fr auto; gap:14px; align-items:end; margin-bottom:14px; }
    .assign2{ display:grid; grid-template-columns: 2fr 1fr; gap:14px; align-items:end; margin-bottom:16px; }

    .input, select{
      width:100%; padding:12px 14px; border-radius:14px; border:1px solid var(--line);
      background: rgba(10,14,35,.65); color:var(--txt); outline:none;
    }
    .btn{
      border:0; cursor:pointer; padding:12px 16px; border-radius:14px; font-weight:900;
      background: linear-gradient(135deg, rgba(35,213,242,.95), rgba(79,140,255,.95));
      color:#06101a;
    }
    .btn-green{ background: linear-gradient(135deg, rgba(24,201,100,.95), rgba(35,213,242,.75)); }

    .tablewrap{ border-radius: 18px; border:1px solid rgba(255,255,255,.10); overflow:auto; background: rgba(9,12,28,.35); }
    table{ width:100%; border-collapse:collapse; min-width: 1000px; }
    th, td{ padding: 16px 14px; border-bottom:1px solid rgba(255,255,255,.06); font-size: 13px; }
    th{ color: rgba(181,192,255,.88); text-transform:uppercase; font-size:11px; letter-spacing:.9px; }

    /* RESTAURACIÓN DE BOTONES ORIGINALES */
    .actions{ display:flex; gap:10px; flex-wrap:wrap; }
    .a-btn{
      border:0; cursor:pointer; padding:10px 14px; border-radius: 12px;
      font-weight:1000; font-size:12px; color:#06101a; transition:.12s;
      user-select:none; white-space:nowrap;
    }
    .a-btn:hover{filter:brightness(1.06)}
    .a-btn:active{transform:translateY(1px)}
    
    .a-copy{ background: linear-gradient(135deg, rgba(35,213,242,.98), rgba(79,140,255,.92)); }
    .a-renew{ background: linear-gradient(135deg, rgba(24,201,100,.98), rgba(24,201,100,.70)); }
    .a-move{ background: linear-gradient(135deg, rgba(245,179,1,.98), rgba(245,179,1,.72)); }
    .a-del{ background: linear-gradient(135deg, rgba(255,59,95,.98), rgba(255,59,95,.72)); color:#fff; }

    .mini{ color: rgba(181,192,255,.75); font-size:12px; }
    .badge-status{ padding:7px 12px; border-radius: 999px; font-weight:1000; font-size:12px; border:1px solid rgba(255,255,255,.10); }
    .badge-status.red{ background: rgba(255,59,95,.14); border-color: rgba(255,59,95,.32); color:#ffd5dc; }
    .badge-status.green{ background: rgba(24,201,100,.14); border-color: rgba(24,201,100,.32); color:#d6ffe8; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <div class="logo">SS</div>
        <div class="title">
          <h1>SISTEMA STREAMING</h1>
          <p class="sub">administración • ventas • control</p>
        </div>
      </div>
      <div style="display:flex; gap:10px">
        <input class="input" id="adminKey" placeholder="Admin Key" style="width:180px" />
        <button class="btn" id="btnReload" style="background:rgba(255,255,255,0.1); color:#fff">🔄</button>
      </div>
    </div>

    <div class="kpis">
      <div class="kpi"><p class="n" id="cActivos">0</p><div class="lbl">ACTIVOS</div></div>
      <div class="kpi red"><p class="n" id="cVencidos">0</p><div class="lbl">VENCIDOS</div></div>
      <div class="kpi"><p class="n" id="cTotal">0</p><div class="lbl">TOTAL CLIENTES</div></div>
    </div>

    <div class="panel">
      <div class="assign">
        <div><div style="font-size:11px; margin-bottom:5px">SERVICIO</div><select id="asSvc" class="input"></select></div>
        <div><div style="font-size:11px; margin-bottom:5px">CUENTA DISPONIBLE</div><select id="asAccount" class="input"></select></div>
        <div><div style="font-size:11px; margin-bottom:5px">NOMBRE CLIENTE</div><input id="asName" class="input" placeholder="Nombre" /></div>
        <button id="btnAssign" class="btn btn-green">✓ REGISTRAR VENTA</button>
      </div>

      <div class="assign2">
        <div><div style="font-size:11px; margin-bottom:5px">WHATSAPP / DÍAS</div>
          <div style="display:flex; gap:10px">
            <input id="asTel" class="input" placeholder="Ej: 1809..." style="flex:2" />
            <input id="asDays" class="input" type="number" value="30" style="flex:1" />
          </div>
        </div>
        <div><div style="font-size:11px; margin-bottom:5px">FILTRAR LISTA</div>
          <select id="f" class="input">
            <option value="">TODOS</option>
            <option value="vencidos">VENCIDOS</option>
            <option value="porvencer">POR VENCER</option>
            <option value="activos">ACTIVOS</option>
          </select>
        </div>
      </div>

      <div style="margin-bottom:15px"><input class="input" id="q" placeholder="Buscar cliente o cuenta..." /></div>
      <div id="status" style="font-size:12px; margin-bottom:10px; color:var(--muted)">Cargando...</div>

      <div class="tablewrap">
        <table>
          <thead>
            <tr>
              <th>SERVICIO</th>
              <th>CUENTA</th>
              <th>CLIENTE</th>
              <th>ESTADO</th>
              <th>ACCIONES DE CONTROL</th>
            </tr>
          </thead>
          <tbody id="tb"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let allRows = [];
    let availableMapByService = {};
    const $ = id => document.getElementById(id);

    async function api(path, opts = {}) {
      const key = $("adminKey").value.trim();
      const res = await fetch(path, {
        ...opts,
        headers: { "Content-Type": "application/json", "x-admin-key": key, ...(opts.headers || {}) }
      });
      return await res.json();
    }

    async function load() {
      $("status").textContent = "Sincronizando...";
      try {
        const data = await api("/api/dashboard");
        allRows = (data.rows || []).filter(r => (r.servicio || r.correo || r.nombre));

        const c = { vencidos: 0, activos: 0, total: 0 };
        availableMapByService = {};

        allRows.forEach(r => {
          const isDisp = String(r.nombre).toLowerCase().trim() === "disponible";
          if (isDisp) {
            const s = r.servicio || "OTROS";
            if (!availableMapByService[s]) availableMapByService[s] = [];
            availableMapByService[s].push(r);
          } else {
            c.total++;
            if (r.bucket === "vencidos") c.vencidos++;
            else c.activos++;
          }
        });

        $("cTotal").textContent = c.total;
        $("cVencidos").textContent = c.vencidos;
        $("cActivos").textContent = c.activos;

        updateDropdowns();
        render();
        $("status").textContent = "Listo ✅";
      } catch (e) { $("status").textContent = "Error de conexión"; }
    }

    function updateDropdowns() {
      const svcs = Object.keys(availableMapByService).sort();
      const selSvc = $("asSvc");
      const currentSvc = selSvc.value;
      selSvc.innerHTML = `<option value="">Seleccionar...</option>` + 
        svcs.map(s => `<option value="${s}">${s} (${availableMapByService[s].length})</option>`).join("");
      if (currentSvc) { selSvc.value = currentSvc; fillAccounts(); }
    }

    function fillAccounts() {
      const svc = $("asSvc").value;
      const list = availableMapByService[svc] || [];
      $("asAccount").innerHTML = list.map(r => `<option value="${r.row}">${r.correo} (P:${r.perfil})</option>`).join("");
    }

    function render() {
      const q = $("q").value.toLowerCase();
      const f = $("f").value;
      const tb = $("tb");
      tb.innerHTML = "";

      allRows.filter(r => {
        const matchQ = !q || (r.nombre + r.correo + r.servicio).toLowerCase().includes(q);
        const matchF = !f || r.bucket === f;
        return matchQ && matchF;
      }).forEach(r => {
        const isD = String(r.nombre).toLowerCase().trim() === "disponible";
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td style="color:var(--cyan); font-weight:1000; letter-spacing:.4px">${r.servicio}</td>
          <td><div><b>${r.correo}</b></div><div class="mini">Perfil: ${r.perfil} • PIN: ${r.pin}</div></td>
          <td>${isD ? '<b style="color:rgba(181,192,255,.9)">Disponible</b>' : `<b>${r.nombre}</b><div class="mini">${r.telefono}</div>`}</td>
          <td><span class="badge-status ${r.bucket === 'vencidos' ? 'red' : 'green'}">${r.dias} DÍAS</span></td>
          <td>
            <div class="actions">
              <button class="a-btn a-copy" onclick="copyRow(${r.row})">COPIAR</button>
              ${!isD ? `<button class="a-btn a-renew" onclick="renovar(${r.row})">RENOVAR</button>` : ''}
              ${!isD ? `<button class="a-btn a-move" onclick="reassignRow(${r.row})">REASIGNAR</button>` : ''}
              <button class="a-btn a-del" onclick="liberar(${r.row})">BORRAR</button>
            </div>
          </td>
        `;
        tb.appendChild(tr);
      });
    }

    async function asignar() {
      const row = $("asAccount").value;
      const nombre = $("asName").value;
      const telefono = $("asTel").value;
      const dias = $("asDays").value;
      if (!row || !nombre) return alert("Faltan datos");
      const res = await api("/api/asignar", {
        method: "POST",
        body: JSON.stringify({ row: Number(row), nombre, telefono, dias: Number(dias) })
      });
      if (res.ok) { alert("✅ Venta registrada"); load(); }
    }

    // Funciones de botones (necesitan estar conectadas a tus rutas de API)
    async function renovar(row) {
      const dias = prompt("¿Días a renovar?", "30");
      if (!dias) return;
      const res = await api("/api/renovar", { method: "POST", body: JSON.stringify({ row, dias: Number(dias) }) });
      if (res.ok) load();
    }

    async function liberar(row) {
      if (!confirm("¿Liberar esta cuenta?")) return;
      const res = await api("/api/delete", { method: "POST", body: JSON.stringify({ row }) });
      if (res.ok) load();
    }

    $("asSvc").onchange = fillAccounts;
    $("btnAssign").onclick = asignar;
    $("btnReload").onclick = load;
    $("q").oninput = render;
    $("f").onchange = render;
    window.onload = load;
  </script>
</body>
</html>
