<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Super Streaming Admin</title>
  <style>
    /* Se mantienen tus estilos originales para no dañar el diseño */
    :root{ --bg0:#070A16; --bg1:#0B1026; --bg2:#0E173A; --line: rgba(255,255,255,.10); --txt:#F6F8FF; --muted:#B5C0FF; --red:#ff3b5f; --green:#18c964; --yellow:#f5b301; --cyan:#23d5f2; --blue:#4f8cff; --purple:#b094ff; --shadow: 0 20px 70px rgba(0,0,0,.55); --shadow2: 0 10px 30px rgba(0,0,0,.45); }
    *{box-sizing:border-box} html,body{height:100%}
    body{ margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; color:var(--txt); background: radial-gradient(900px 520px at 12% 8%, rgba(79,140,255,.22), transparent 60%), radial-gradient(900px 600px at 88% 8%, rgba(176,148,255,.20), transparent 55%), radial-gradient(820px 520px at 50% 92%, rgba(35,213,242,.12), transparent 62%), linear-gradient(180deg, var(--bg0), var(--bg1) 40%, var(--bg2)); }
    .wrap{max-width:1400px;margin:0 auto;padding:22px 18px 70px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:18px;}
    .brand{display:flex;align-items:center;gap:14px;}
    .logo{width:50px;height:50px;border-radius:18px;display:grid;place-items:center;font-weight:1000;background: linear-gradient(135deg, rgba(79,140,255,.95), rgba(176,148,255,.95)); border:1px solid rgba(255,255,255,.10); box-shadow: 0 18px 50px rgba(79,140,255,.16);}
    .title h1{margin:0;font-size:22px;line-height:1} .title .sub{margin:0;color:var(--muted);font-size:12px}
    .kpis{display:grid;grid-template-columns: repeat(3, minmax(0, 1fr));gap:16px;margin-bottom:18px;}
    .kpi{background: rgba(12,16,35,.62); border:1px solid rgba(255,255,255,.10); border-radius: 22px; padding: 22px 18px; text-align:center; backdrop-filter: blur(16px);}
    .kpi .n{font-size:44px;font-weight:1000;margin:0;} .kpi.red .n{ color: var(--red); }
    .panel{background: rgba(12,16,35,.62); border:1px solid rgba(255,255,255,.10); border-radius: 22px; padding:18px;}
    .assign{display:grid;grid-template-columns: 1.3fr 1.3fr 1.2fr auto;gap:14px;align-items:end;margin-bottom:14px;}
    .input, select{width:100%;padding:12px 14px;border-radius:14px;border:1px solid var(--line);background: rgba(10,14,35,.65);color:var(--txt);outline:none;}
    .btn{border:0;cursor:pointer;padding:12px 16px;border-radius:14px;font-weight:900;background: linear-gradient(135deg, rgba(35,213,242,.95), rgba(79,140,255,.95));color:#06101a;}
    .tablewrap{border-radius: 18px; border:1px solid rgba(255,255,255,.10); overflow:auto; background: rgba(9,12,28,.35);}
    table{width:100%;border-collapse:collapse;min-width: 1000px;}
    th, td{padding: 16px 14px; border-bottom:1px solid rgba(255,255,255,.06); font-size: 13px;}
    .actions{display:flex;gap:8px;}
    .a-btn{border:0;cursor:pointer;padding:8px 12px;border-radius: 10px;font-weight:1000;font-size:11px;color:#06101a;}
    .a-copy{ background: var(--cyan); } .a-renew{ background: var(--green); } .a-del{ background: var(--red); color:#fff; } .a-move{ background: var(--yellow); }
    .badge-status{padding:4px 10px;border-radius: 999px;font-weight:800;font-size:11px;}
    .badge-status.red{background: rgba(255,59,95,.14); color:var(--red);} .badge-status.green{background: rgba(24,201,100,.14); color:var(--green);}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand"><div class="logo">SS</div><div class="title"><h1>SISTEMA STREAMING</h1><p class="sub">control de ventas</p></div></div>
      <div style="display:flex; gap:10px"><input class="input" id="adminKey" placeholder="Admin Key" style="width:180px" /><button class="btn" id="btnReload">🔄</button></div>
    </div>

    <div class="kpis">
      <div class="kpi"><p class="n" id="cActivos">0</p><div>ACTIVOS</div></div>
      <div class="kpi red"><p class="n" id="cVencidos">0</p><div>VENCIDOS</div></div>
      <div class="kpi"><p class="n" id="cTotal">0</p><div>TOTAL</div></div>
    </div>

    <div class="panel">
      <div class="assign">
        <div><small>SERVICIO</small><select id="asSvc" class="input"></select></div>
        <div><small>CUENTA LIBRE</small><select id="asAccount" class="input"></select></div>
        <div><small>CLIENTE</small><input id="asName" class="input" placeholder="Nombre" /></div>
        <button id="btnAssign" class="btn">✓ ASIGNAR</button>
      </div>

      <div style="margin: 15px 0"><input class="input" id="q" placeholder="Buscar cliente..." /></div>
      <div id="status" style="font-size:12px; color:var(--muted)">Cargando...</div>

      <div class="tablewrap">
        <table>
          <thead><tr><th>SERVICIO</th><th>CUENTA</th><th>CLIENTE</th><th>ESTADO</th><th>ACCIONES</th></tr></thead>
          <tbody id="tb"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let allRows = [];
    let availableMap = {};
    const $ = id => document.getElementById(id);

    async function api(path, opts = {}) {
      const key = $("adminKey").value.trim();
      const res = await fetch(path, {
        ...opts,
        headers: { "Content-Type": "application/json", "x-admin-key": key, ...(opts.headers || {}) }
      });
      return await res.json();
    }

    async function load() {
      $("status").textContent = "Actualizando...";
      try {
        const data = await api("/api/dashboard");
        allRows = data.rows || [];
        availableMap = {};
        
        let activos = 0, vencidos = 0;
        allRows.forEach(r => {
          if (String(r.nombre).toLowerCase() === "disponible") {
            if (!availableMap[r.servicio]) availableMap[r.servicio] = [];
            availableMap[r.servicio].push(r);
          } else {
            if (r.bucket === "vencidos") vencidos++; else activos++;
          }
        });

        $("cActivos").textContent = activos;
        $("cVencidos").textContent = vencidos;
        $("cTotal").textContent = activos + vencidos;

        updateDropdowns();
        render();
        $("status").textContent = "Sincronizado ✅";
      } catch (e) { $("status").textContent = "Error de conexión"; }
    }

    function updateDropdowns() {
      const svcs = Object.keys(availableMap).sort();
      $("asSvc").innerHTML = `<option value="">Seleccionar...</option>` + svcs.map(s => `<option value="${s}">${s} (${availableMap[s].length})</option>`).join("");
      $("asAccount").innerHTML = `<option value="">Elige servicio primero</option>`;
    }

    $("asSvc").onchange = () => {
      const svc = $("asSvc").value;
      const list = availableMap[svc] || [];
      $("asAccount").innerHTML = list.map(r => `<option value="${r.row}">${r.correo} (P:${r.perfil})</option>`).join("");
    };

    function render() {
      const q = $("q").value.toLowerCase();
      const tb = $("tb");
      tb.innerHTML = "";

      allRows.filter(r => (r.nombre + r.correo + r.servicio).toLowerCase().includes(q)).forEach(r => {
        const isD = String(r.nombre).toLowerCase() === "disponible";
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td style="color:var(--cyan); font-weight:bold">${r.servicio}</td>
          <td>${r.correo}<br><small>P:${r.perfil} PIN:${r.pin}</small></td>
          <td>${isD ? "DISPONIBLE" : r.nombre}</td>
          <td><span class="badge-status ${r.bucket==='vencidos'?'red':'green'}">${r.dias} DÍAS</span></td>
          <td>
            <div class="actions">
              <button class="a-btn a-copy" onclick="copiar(${r.row})">COPIAR</button>
              ${!isD ? `<button class="a-btn a-renew" onclick="renovar(${r.row})">RENOVAR</button>` : ''}
              ${!isD ? `<button class="a-btn a-move" onclick="reasignar(${r.row})">MOVER</button>` : ''}
              <button class="a-btn a-del" onclick="borrar(${r.row})">BORRAR</button>
            </div>
          </td>
        `;
        tb.appendChild(tr);
      });
    }

    // --- FUNCIONES DE LOS BOTONES ---

    async function asignarEnFila() {
      const row = $("asAccount").value;
      const nombre = $("asName").value;
      if (!row || !nombre) return alert("Faltan datos");
      
      const res = await api("/api/asignar", {
        method: "POST",
        body: JSON.stringify({ row: Number(row), nombre, dias: 30 })
      });
      if (res.ok) { alert("Venta Exitosa"); load(); }
    }

    window.copiar = async (rowId) => {
      const r = allRows.find(x => x.row == rowId);
      const txt = `Servicio: ${r.servicio}\nCorreo: ${r.correo}\nClave: ${r.contrasena}\nPerfil: ${r.perfil}\nPIN: ${r.pin}`;
      await navigator.clipboard.writeText(txt);
      alert("Copiado al portapapeles");
    };

    window.renovar = async (row) => {
      const res = await api("/api/renovar", { method: "POST", body: JSON.stringify({ row, dias: 30 }) });
      if (res.ok) load();
    };

    window.reasignar = async (fromRow) => {
      const toRow = prompt("Número de fila destino (Disponible):");
      if (!toRow) return;
      const res = await api("/api/reassign", { method: "POST", body: JSON.stringify({ fromRow, toRow: Number(toRow) }) });
      if (res.ok) load();
    };

    window.borrar = async (row) => {
      if (!confirm("¿Liberar cuenta?")) return;
      const res = await api("/api/free", { method: "POST", body: JSON.stringify({ row }) });
      if (res.ok) load();
    };

    $("btnAssign").onclick = asignarEnFila;
    $("btnReload").onclick = load;
    $("q").oninput = render;
    window.onload = load;
  </script>
</body>
</html>
