<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Panel Streaming PRO</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

h1{
margin-bottom:10px;
}

.dashboard{
display:flex;
gap:20px;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
flex:1;
text-align:center;
font-size:20px;
}

.panel{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input{
padding:10px;
margin:5px;
border:none;
border-radius:5px;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:5px;
cursor:pointer;
background:#22c55e;
color:white;
}

button:hover{
background:#16a34a;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
}

th{
background:#020617;
}

tr:hover{
background:#334155;
}

</style>

</head>

<body>

<h1>🎬 PANEL STREAMING PRO</h1>

<div class="dashboard">

<div class="card">
Cuentas Totales
<br>
<span id="total">0</span>
</div>

<div class="card">
Disponibles
<br>
<span id="disponibles">0</span>
</div>

<div class="card">
Vencen Hoy
<br>
<span id="vencen">0</span>
</div>

</div>

<div class="panel">

<h3>Asignar Cuenta</h3>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">
<input id="servicio" placeholder="Servicio">

<button onclick="asignar()">Asignar</button>

</div>

<div class="panel">

<h3>Buscar Cliente</h3>

<input id="buscar" placeholder="Buscar..." onkeyup="filtrar()">

</div>

<div class="panel">

<h3>Lista de Cuentas</h3>

<button onclick="cargar()">Actualizar</button>

<table id="tabla">

<thead>

<tr>
<th>Código</th>
<th>Nombre</th>
<th>Teléfono</th>
<th>Servicio</th>
<th>Correo</th>
<th>Perfil</th>
<th>Pin</th>
<th>Vencimiento</th>
<th>Estado</th>
<th>Acciones</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

<script>

const API="https://TU-APP-RAILWAY.up.railway.app"

let cuentas=[]

async function cargar(){

const res=await fetch(API+"/cuentas")
cuentas=await res.json()

const tbody=document.querySelector("#tabla tbody")

tbody.innerHTML=""

let disponibles=0
let vencen=0

const hoy=new Date().toISOString().split("T")[0]

cuentas.forEach(row=>{

if(!row) return

if((row[1]||"").toLowerCase()=="disponible") disponibles++

if(row[9]==hoy) vencen++

const tr=document.createElement("tr")

tr.innerHTML=`

<td>${row[0]||""}</td>
<td>${row[1]||""}</td>
<td>${row[2]||""}</td>
<td>${row[3]||""}</td>
<td>${row[4]||""}</td>
<td>${row[6]||""}</td>
<td>${row[7]||""}</td>
<td>${row[9]||""}</td>
<td>${row[11]||""}</td>

<td>

<button onclick="liberar('${row[0]}')">Liberar</button>

<button onclick="renovar('${row[0]}')">+30</button>

<button onclick="whatsapp('${row[2]}','${row[4]}','${row[5]}','${row[6]}','${row[7]}')">
WhatsApp
</button>

</td>

`

tbody.appendChild(tr)

})

document.getElementById("total").innerText=cuentas.length
document.getElementById("disponibles").innerText=disponibles
document.getElementById("vencen").innerText=vencen

}

async function asignar(){

const nombre=document.getElementById("nombre").value
const telefono=document.getElementById("telefono").value
const servicio=document.getElementById("servicio").value

const res=await fetch(API+"/asignar",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({nombre,telefono,servicio})
})

alert("Cuenta asignada")

cargar()

}

async function liberar(codigo){

await fetch(API+"/liberar",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({codigo})
})

cargar()

}

async function renovar(codigo){

await fetch(API+"/renovar",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({codigo,dias:30})
})

cargar()

}

function whatsapp(tel,correo,pass,perfil,pin){

const msg=`DATOS DE TU CUENTA

Correo: ${correo}
Contraseña: ${pass}
Perfil: ${perfil}
Pin: ${pin}`

window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`)

}

function filtrar(){

const texto=document.getElementById("buscar").value.toLowerCase()

const filas=document.querySelectorAll("#tabla tbody tr")

filas.forEach(f=>{

const contenido=f.innerText.toLowerCase()

f.style.display=contenido.includes(texto)?"":"none"

})

}

cargar()

setInterval(cargar,20000)

</script>

</body>
</html>
