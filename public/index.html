<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Panel Streaming</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
padding:30px;
}

h1{
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input{
padding:10px;
margin:5px;
border:none;
border-radius:5px;
}

button{
padding:10px 20px;
border:none;
border-radius:5px;
background:#22c55e;
color:white;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
text-align:left;
}

th{
background:#020617;
}

</style>

</head>

<body>

<h1>🎬 PANEL STREAMING</h1>

<div class="card">

<h3>Asignar Cuenta</h3>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">
<input id="servicio" placeholder="Servicio">

<button onclick="asignar()">Asignar</button>

</div>

<div class="card">

<h3>Liberar Cuenta</h3>

<input id="codigoLiberar" placeholder="Código">

<button onclick="liberar()">Liberar</button>

</div>

<div class="card">

<h3>Renovar Cuenta</h3>

<input id="codigoRenovar" placeholder="Código">
<input id="diasRenovar" placeholder="Días">

<button onclick="renovar()">Renovar</button>

</div>

<div class="card">

<h3>Lista de Cuentas</h3>

<button onclick="cargar()">Actualizar</button>

<table id="tabla">

<thead>

<tr>
<th>Código</th>
<th>Nombre</th>
<th>Teléfono</th>
<th>Servicio</th>
<th>Correo</th>
<th>Perfil</th>
<th>Vencimiento</th>
<th>Estado</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

<script>

const API="https://TU-APP-RAILWAY.up.railway.app"

async function asignar(){

const nombre=document.getElementById("nombre").value
const telefono=document.getElementById("telefono").value
const servicio=document.getElementById("servicio").value

const res=await fetch(API+"/asignar",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({nombre,telefono,servicio})
})

const data=await res.json()

alert(JSON.stringify(data))

cargar()

}

async function liberar(){

const codigo=document.getElementById("codigoLiberar").value

const res=await fetch(API+"/liberar",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({codigo})
})

alert("Cuenta liberada")

cargar()

}

async function renovar(){

const codigo=document.getElementById("codigoRenovar").value
const dias=document.getElementById("diasRenovar").value

const res=await fetch(API+"/renovar",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({codigo,dias})
})

alert("Cuenta renovada")

cargar()

}

async function cargar(){

const res=await fetch(API+"/cuentas")

const data=await res.json()

const tbody=document.querySelector("#tabla tbody")

tbody.innerHTML=""

data.forEach(row=>{

const tr=document.createElement("tr")

tr.innerHTML=`

<td>${row[0]||""}</td>
<td>${row[1]||""}</td>
<td>${row[2]||""}</td>
<td>${row[3]||""}</td>
<td>${row[4]||""}</td>
<td>${row[6]||""}</td>
<td>${row[9]||""}</td>
<td>${row[11]||""}</td>

`

tbody.appendChild(tr)

})

}

cargar()

</script>

</body>

</html>
